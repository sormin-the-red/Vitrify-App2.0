name: glazevault
description: "GlazeVault — ceramic glaze recipe manager for potters."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  # ── State & Navigation ────────────────────────────────────────────────────
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1

  # ── AWS Auth (Cognito) ────────────────────────────────────────────────────
  amplify_flutter: ^2.6.1
  amplify_auth_cognito: ^2.6.1

  # ── HTTP ──────────────────────────────────────────────────────────────────
  http: ^1.4.0

  # ── Local Storage ─────────────────────────────────────────────────────────
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.3

  # ── Images ────────────────────────────────────────────────────────────────
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # ── Connectivity ──────────────────────────────────────────────────────────
  connectivity_plus: ^6.1.4

  # ── UI ────────────────────────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.17

  # ── Utilities ─────────────────────────────────────────────────────────────
  uuid: ^4.5.1
  intl: ^0.20.2
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # ── Code generation ───────────────────────────────────────────────────────
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.3
  freezed: ^2.5.7
  json_serializable: ^6.9.4

flutter:
  uses-material-design: true

  assets:
    - assets/knowledge/glaze_fundamentals.md
